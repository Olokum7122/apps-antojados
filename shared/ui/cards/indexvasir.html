<!-- STAGE S1 (sin sponsorId) -->
<div id="stageS1" class="stage-s1">
  <!-- Glass P1 (250px, bottom 0) -->
  <div class="glass-back" id="glassBack">
    <div class="title" id="p1Title">{{titulo}}</div>
  </div>

  <!-- MediaBox (bottom 120px) — REUSADA también por S2 -->
  <div class="media-box" id="mediaBox">
    <img id="mainImage"
      src="{{main_image}}"
      alt="{{nombre_platillo}}"
    />
    <div class="carousel-dots" id="carouselDots">
      {{carousel_dots}}
    </div>
    <div class="badge" id="badgeLabel">{{badge}}</div>
    <div class="watermark">VAS IR</div>
    <div class="platillo-name">{{nombre_platillo}}</div>
  </div>

  <!-- Botones (tema + sponsor) — visibles solo en S1 -->
  <div class="card-actions" id="cardActions">
    <button class="btn-theme" id="btnTheme" title="Cambiar tema"></button>
    <button class="btn-sponsor" data-action="ver-sponsor" data-sponsor-id="{{sponsor_id}}">
      Ver Sponsor →
    </button>
  </div>

  <!-- Glass P2 (250px, bottom 0) -->
  <div class="glass-front" id="glassP2">
    <div class="front-title">{{titulo}}</div>
    <div class="front-desc">{{descripcion}}</div>
  </div>
</div>

<!-- STAGE S2 (con sponsorId) — overlay de comentarios + rail sobre la misma media box S1 -->
<div id="stageS2" class="stage-s2" style="display:none">
  <!-- Botón de retorno S2 → S1 (arriba izquierda) -->
  <button class="s2-back" id="btnBackToS1" title="Volver">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
  </button>

  <!-- Glass P3 (comentarios, 250px, bottom) con scroll y input -->
  <div class="glass-comments" id="glassP3">
    <div class="comments-list" id="commentsList">
      {{comments_html}}
    </div>
    <div class="comments-input-row">
      <input class="comments-input" id="commentInput" type="text" placeholder="Escribe un comentario..." />
    </div>
  </div>

  <!-- Rail S2 (lado derecho, centrado vertical) -->
  <div class="s2-rail" id="s2Rail">
    <button class="rail-btn rail-btn--like" data-action="like" title="Chocalas">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3m7-2V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14Z"/></svg>
      <span class="rail-count" id="likeCount">0</span>
    </button>
    <button class="rail-btn rail-btn--comment" data-action="comment" title="Morrar">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v10Z"/></svg>
      <span class="rail-count" id="commentCount">0</span>
    </button>
    <button class="rail-btn rail-btn--share" data-action="share" title="Pasala">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    </button>
    <button class="rail-btn rail-btn--maps" data-action="maps" title="Califica">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
    </button>
    <div class="rail-divider"></div>
    <button class="rail-btn rail-btn--fab" id="btnFabPublicar" title="Publicar">
      <img src="/shared/publicar.png" alt="Publicar" style="width:50px;height:50px;object-fit:contain;display:block;pointer-events:none;" />
    </button>
  </div>
</div>
